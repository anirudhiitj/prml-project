defaults:
  - base

experiment_name: dprnn_tasnet_2spk_v2

model:
  num_speakers: 2
  encoder_dim: 512
  encoder_kernel: 20
  encoder_stride: 10
  bottleneck_dim: 256
  chunk_size: 200
  num_dprnn_blocks: 6

data:
  root: data/librispeech_v2_mixtures/2spk
  sample_rate: 16000
  clip_seconds: 4
  clip_samples: 64000
  train_batch_size: 16
  val_batch_size: 8
  num_workers: 16

train:
  epochs: 150
  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.00001
  grad_clip_norm: 5.0
  snr_weight: 0.1
  amp: true

scheduler:
  mode: max
  factor: 0.5
  patience: 15
  min_lr: 0.0000001

logging:
  use_wandb: false
  project: cocktail-separation
  log_interval: 25
  save_audio_every: 10

checkpoints:
  dir: checkpoints/2spk_v2
  save_every: 10
