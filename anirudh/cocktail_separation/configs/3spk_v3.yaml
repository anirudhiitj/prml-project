defaults:
  - base

experiment_name: dprnn_tasnet_3spk_v3

# Fine-tune from 3spk_v2 best (8.26 dB)
finetune_from: checkpoints/3spk_v2/best.pt

model:
  num_speakers: 3
  encoder_dim: 512
  encoder_kernel: 20
  encoder_stride: 10
  bottleneck_dim: 256
  chunk_size: 200
  num_dprnn_blocks: 6
  dropout: 0.2

data:
  root: data/librispeech_v2_mixtures/3spk
  sample_rate: 16000
  clip_seconds: 4
  clip_samples: 64000
  train_batch_size: 24
  val_batch_size: 16
  num_workers: 16

augmentation:
  gain_range_db: 5.0
  speed_perturb: true
  epoch_size: 30000   # more mixtures per epoch than original 20k

train:
  epochs: 500
  lr: 0.0002
  warmup_epochs: 10
  betas: [0.9, 0.999]
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  snr_weight: 0.1
  amp: true

early_stopping:
  patience: 40
  min_delta: 0.01

logging:
  use_wandb: false
  project: cocktail-separation
  log_interval: 25
  save_audio_every: 10

checkpoints:
  dir: checkpoints/3spk_v3
  save_every: 10
