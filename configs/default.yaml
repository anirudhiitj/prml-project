# ============================================================
# DPRNN-TasNet Configuration
# ============================================================

# --- Encoder / Decoder ---
encoder_dim: 64          # N: number of encoder output channels
encoder_kernel: 2        # L: Conv1d kernel size (analysis window)
encoder_stride: 1        # Stride (hop size), typically L // 2

# --- Chunking ---
chunk_size: 250          # K: number of frames per chunk
hop_size: 125            # P: hop between chunks (50% overlap)

# --- DPRNN ---
hidden_size: 128         # H: RNN hidden dimension
rnn_num_layers: 1        # Number of RNN layers inside each sub-block
num_dprnn_blocks: 6      # B: number of stacked DPRNN blocks
rnn_type: "lstm"         # "lstm" or "gru"
bidirectional: true      # Use bidirectional RNNs
dropout: 0.0             # Dropout probability in RNN

# --- Mask ---
num_sources: 2           # C: number of speakers to separate
mask_activation: "relu"  # Activation for mask estimation ("relu" or "sigmoid")

# --- Training ---
batch_size: 4
lr: 0.001
weight_decay: 0.0
max_grad_norm: 5.0       # Gradient clipping max norm
epochs: 100
sample_rate: 8000
max_audio_len: 4.0       # Max audio length in seconds (for padding/trimming)

# --- LR Scheduler ---
scheduler_patience: 5    # ReduceLROnPlateau patience
scheduler_factor: 0.5    # LR reduction factor

# --- Paths ---
train_dir: "data/train"
val_dir: "data/val"
test_dir: "data/test"
checkpoint_dir: "checkpoints"

# --- Misc ---
num_workers: 4
seed: 42
